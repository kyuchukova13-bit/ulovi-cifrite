<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Мисия: Знание - Дочка Кючукова</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #001f3f; font-family: 'Arial Black', sans-serif; }
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #001f3f; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 4000;
        }
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #001f3f, #0074D9); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        h1 { font-size: 50px; color: #FFDC00; text-shadow: 4px 4px #FF4136; text-align: center; }
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 10px; }
        .btn-menu { padding: 15px 25px; font-size: 20px; cursor: pointer; border-radius: 15px; border: 3px solid white; color: white; font-weight: bold; }
        .math { background: #0074D9; }
        .lang { background: #2ECC40; }
    </style>
</head>
<body>

<div id="loading-screen">
    <h1 id="load-msg">ЗАРЕЖДАНЕ...</h1>
    <p>Проверете дали камерата е разрешена</p>
</div>

<div id="menu">
    <h1>МИСИЯ: ЗНАНИЕ</h1>
    <div style="color:white; margin-bottom:20px;">Автор: Дочка Кючукова</div>
    <div class="btn-group">
        <button class="btn-menu math" onclick="startMission('even', 10)">Четни до 10</button>
        <button class="btn-menu math" onclick="startMission('even', 20)">Четни до 20</button>
    </div>
    <div class="btn-group">
        <button class="btn-menu lang" onclick="startMission('vowels')">Гласни</button>
        <button class="btn-menu lang" onclick="startMission('consonants')">Съгласни</button>
    </div>
</div>

<script>
let bg, imgBubble, sndCorrect, sndWrong, video, handpose, predictions = [];
let gameActive = false, score = 0, lives = 3, fallingItems = [], currentMission = null;

function preload() {
    bg = loadImage('pic.png', () => console.log("BG OK"), () => console.log("Липсва pic.png"));
    // Редът за imgBubble е изтрит!
}
function setup() { 
    createCanvas(windowWidth, windowHeight);
    
    // Подсигуряване на звука
    try {
        sndCorrect = new Audio('1.mp3');
        sndWrong = new Audio('2.mp3');
    } catch(e) {}

    // Стартиране на камерата веднага
    video = createCapture(VIDEO, () => {
        handpose = ml5.handpose(video, () => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        });
        handpose.on("predict", res => { predictions = res; });
    });
    video.size(640, 480);
    video.hide();
}

function startMission(type, val) {
    currentMission = { type, value: val };
    score = 0; lives = 3; fallingItems = []; gameActive = true;
    document.getElementById('menu').style.display = 'none';
}

function draw() {
    if (bg) image(bg, 0, 0, width, height); else background(0, 50, 100);

    if (!gameActive) return;

    if (predictions.length > 0) {
        let hand = predictions[0].landmarks[8];
        let x = map(hand[0], 0, 640, width, 0);
        let y = map(hand[1], 0, 480, 0, height);
        fill(255, 200); noStroke(); ellipse(x, y, 40, 40);
        checkHit(x, y);
    }

    if (frameCount % 60 === 0) fallingItems.push(new Item());

    for (let i = fallingItems.length - 1; i >= 0; i--) {
        fallingItems[i].update();
        fallingItems[i].show();
        if (fallingItems[i].y > height) {
            if (fallingItems[i].isCorrect) lives--;
            fallingItems.splice(i, 1);
        }
    }
    
    fill(0, 150); rect(10, 10, 200, 80, 10);
    fill("#FFDC00"); textSize(24); text("Точки: " + score, 30, 40);
    text("Живот: " + lives, 30, 70);

    if (lives <= 0) {
        gameActive = false;
        setTimeout(() => { document.getElementById('menu').style.display = 'flex'; }, 2000);
    }
}

function checkHit(hx, hy) {
    for (let i = fallingItems.length - 1; i >= 0; i--) {
        if (dist(hx, hy, fallingItems[i].x, fallingItems[i].y) < 80) {
            if (fallingItems[i].isCorrect) { 
                score++; if(sndCorrect) sndCorrect.play(); 
            } else { 
                lives--; if(sndWrong) sndWrong.play(); 
            }
            fallingItems.splice(i, 1);
        }
    }
}

class Item {
    constructor() {
        this.x = random(100, width - 100);
        this.y = -50;
        this.generate();
    }
    generate() {
        let m = currentMission;
        if (m.type === 'even') {
            this.val = floor(random(1, m.value + 1));
            this.isCorrect = (this.val % 2 === 0);
        } else if (m.type === 'vowels') {
            let v = "АЕИОУЪ"; let c = "БВГДЖЗКЛМНПРСТ";
            this.val = (random() > 0.5) ? v[floor(random(v.length))] : c[floor(random(c.length))];
            this.isCorrect = v.includes(this.val);
        } else if (m.type === 'consonants') {
            let v = "АЕИОУЪ"; let c = "БВГДЖЗЙКЛМНПРСТФХЦЧШЩ";
            this.val = (random() > 0.5) ? c[floor(random(c.length))] : v[floor(random(v.length))];
            this.isCorrect = c.includes(this.val);
        }
    }
    update() { this.y += 4; }
    show() {
    push();
    fill("#FF4136"); // Ярко червен цвят за цифрите
    stroke(255);     // Бял контур
    strokeWeight(8); // Дебел контур за по-добра видимост
    textSize(100);   // Голям размер
    textStyle(BOLD);
    textAlign(CENTER, CENTER);
    text(this.val, this.x, this.y);
    pop();
}
</script>
</body>
</html>
